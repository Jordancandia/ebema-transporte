<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plataforma corporativa Ebema para administración de transporte, control de transportistas, rutas de distribución, centros de distribución SAP y simulación de tarifas.">
  <meta name="author" content="Ebema Logística">
  <title>Ebema Logística - Administración de Transporte</title>
  
  <!-- Icono corporativo -->
  <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='%232563eb' rx='4'/%3E%3Ctext x='7' y='18' fill='white' font-weight='800' font-family='sans-serif' font-size='16'%3EE%3C/text%3E%3C/svg%3E" type="image/x-icon">
  
  <!-- Estilos Globales -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Contenedor principal de la aplicación -->
  <div id="app-root">
    <!-- El contenido será renderizado de forma dinámica por js/app.js -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0b0f19; color: #94a3b8; font-family: sans-serif;">
      <div style="text-align: center;">
        <div style="font-size: 24px; font-weight: 700; color: #f8fafc; margin-bottom: 10px;">Cargando Ebema Logística...</div>
        <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto;"></div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Lógica de la Plataforma (Módulo JS) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
